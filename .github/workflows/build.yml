name: 自动编译扫描器

# 触发条件：代码推送到 main 分支或手动点击运行
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 运行苹果云端打包
    runs-on: macos-latest
    
    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置 Xcode 路径（确保使用最新的开发工具）
      - name: 设置 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. 核心编译步骤
      # 重点：-project 必须指向你的文件夹名，-scheme 必须指向我们在工程文件里定义的 MyScanner
      - name: 编译 iOS 项目 (忽略签名)
        run: |
          xcodebuild archive \
            -project MyScanner.xcodeproj \
            -scheme MyScanner \
            -archivePath "Build/MyScanner.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      # 4. 封装成 IPA 格式
      - name: 制作 IPA 安装包
        run: |
          mkdir -p Payload
          # 将编译生成的 .app 文件夹拷贝到 Payload 内部
          # 注意：这里的路径必须根据实际生成的 app 名字对齐
          cp -r Build/MyScanner.xcarchive/Products/Applications/*.app Payload/
          zip -r MyScanner.ipa Payload

      # 5. 上传安装包到 GitHub 网页
      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: 我的扫描器安装包
          path: MyScanner.ipa
          retention-days: 7
