name: 自动编译扫描器

# 触发条件：代码推送到 main 分支或手动运行
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 运行苹果云端打包
    runs-on: macos-latest
    
    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置环境
      - name: 设置 Xcode 版本
        run: sudo xcode-select -s /Applications/Xcode.app

      # 3. 核心编译步骤（强制注入 Info.plist 解决签名闪退）
      - name: 编译 iOS 项目 (忽略签名)
        run: |
          xcodebuild archive \
            -project MyScanner.xcodeproj \
            -scheme MyScanner \
            -archivePath "Build/MyScanner.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            INFOPLIST_FILE=Info.plist \
            PRODUCT_BUNDLE_IDENTIFIER=com.geek.myscanner \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION=1

      # 4. 封装成 IPA 格式
      - name: 制作 IPA 安装包
        run: |
          mkdir -p Payload
          # 将生成的 .app 文件夹拷贝到 Payload 内部
          # 注意：这里的路径必须指向编译产物中的 .app
          cp -r Build/MyScanner.xcarchive/Products/Applications/*.app Payload/
          zip -r MyScanner.ipa Payload

      # 5. 上传安装包到 GitHub 网页
      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: 我的扫描器正式版
          path: MyScanner.ipa
          retention-days: 7
