name: 自动编译扫描器

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 运行苹果云端打包
    runs-on: macos-latest
    
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置环境
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 3. 编译二进制
        run: |
          xcodebuild archive \
            -project MyScanner.xcodeproj \
            -scheme MyScanner \
            -archivePath "Build/MyScanner.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: 4. 强制组装 IPA (关键步骤)
        run: |
          # 创建打包用的 Payload 文件夹
          mkdir -p Payload
          
          # 第一步：先把编译出的 App 文件夹拷进来
          cp -r Build/MyScanner.xcarchive/Products/Applications/*.app Payload/
          
          # 第二步：获取实际的 App 文件夹名称 (防止路径对不上)
          APP_NAME=$(ls Payload | grep .app)
          
          # 第三步：【核心修复】把你在仓库根目录的 Info.plist 强制覆盖进去
          # 这样能确保 Info.plist 绝对是在 .app 文件夹的第一层
          cp Info.plist "Payload/$APP_NAME/Info.plist"
          
          # 检查一下文件是否真的进去了 (调试用)
          ls -l "Payload/$APP_NAME/Info.plist"
          
          # 第四步：打包成 ipa
          zip -r MyScanner.ipa Payload

      - name: 5. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 我的扫描器修正版
          path: MyScanner.ipa
          retention-days: 7
