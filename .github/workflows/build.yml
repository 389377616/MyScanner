name: 自动编译并发布扫描器

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 运行苹果云端打包与发布
    runs-on: macos-latest
    
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置环境
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 3. 自动更新版本号并导出变量
        run: |
          # 获取 GitHub 的运行次数
          RUN_COUNT=${{ github.run_number }}
          MINOR_VERSION=$(( $RUN_COUNT - 1 ))
          FULL_VERSION="1.$MINOR_VERSION"
          
          # 将版本号存入环境变量，供后续步骤使用
          echo "APP_VERSION=$FULL_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$RUN_COUNT" >> $GITHUB_ENV
          
          echo "准备打包版本: $FULL_VERSION (Build: $RUN_COUNT)"
          
          # 修改 Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $FULL_VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $RUN_COUNT" Info.plist

      - name: 4. 编译二进制
        run: |
          xcodebuild archive \
            -project MyScanner.xcodeproj \
            -scheme MyScanner \
            -archivePath "Build/MyScanner.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: 5. 组装 IPA
        run: |
          mkdir -p Payload
          cp -r Build/MyScanner.xcarchive/Products/Applications/*.app Payload/
          zip -r MyScanner.ipa Payload

      - name: 6. 上传工作流产物 (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: MyScanner-V${{ env.APP_VERSION }}
          path: MyScanner.ipa
          retention-days: 7

      - name: 7. 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: "MyScanner V${{ env.APP_VERSION }} (Build ${{ env.BUILD_NUMBER }})"
          files: MyScanner.ipa
          body: |
            ## 🚀 更新内容
            ${{ github.event.head_commit.message }}
            
            ---
            - **版本号**: ${{ env.APP_VERSION }}
            - **构建编号**: ${{ env.BUILD_NUMBER }}
            - **构建时间**: ${{ github.event.head_commit.timestamp }}
            
            *此版本由 GitHub Actions 自动编译生成，支持自签安装。*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
