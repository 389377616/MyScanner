name: 自动编译扫描器

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 运行苹果云端打包
    runs-on: macos-latest
    
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置环境
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: 3. 编译二进制
        run: |
          xcodebuild archive \
            -project MyScanner.xcodeproj \
            -scheme MyScanner \
            -archivePath "Build/MyScanner.xcarchive" \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

      - name: 4. 组装 IPA
        run: |
          # 创建打包用的 Payload 文件夹
          mkdir -p Payload
          
          # 直接将 Xcode 编译好、已经注入了配置的 .app 拷贝进来
          cp -r Build/MyScanner.xcarchive/Products/Applications/*.app Payload/
          
          # 打包成 ipa
          zip -r MyScanner.ipa Payload

      - name: 5. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 我的扫描器修正版
          path: MyScanner.ipa
          retention-days: 7
